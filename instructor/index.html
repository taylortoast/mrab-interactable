<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>335 TRS Scenario Builder - Instructor</title>
  <link rel="stylesheet" href="../shared/css/base.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <header class="app-header">
    <div>
      <p class="eyebrow">Instructor/Admin</p>
      <h1>Scenario Builder</h1>
    </div>
    <button id="exportScenarioBtn" class="primary-btn">Export Scenario</button>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="buildings">Buildings</button>
    <button class="tab-btn" data-tab="evaluation">Student Evaluation</button>
  </nav>

  <main class="tab-main">

    <div id="tab-buildings" class="tab-panel active">
      <div class="panel-content">
        <h2>Buildings</h2>
        <p class="muted">Select a building to manage its contacts and collection items.</p>
        <div id="buildingList" class="building-list"></div>
      </div>
    </div>

    <div id="tab-evaluation" class="tab-panel">
      <div class="panel-content">
        <h2>Student Evaluation</h2>
        <p class="muted">
          Submissions load automatically from <code>instructor/submissions/</code>.
          Open <code>submissions/index.js</code> for instructions on adding new submissions.
        </p>
        <div id="evaluationOutput" class="evaluation-output"></div>
      </div>
    </div>

  </main>

  <div id="modalRoot"></div>

  <script src="../data/scenario.js"></script>
  <script src="../shared/js/scenarioLoader.js"></script>
  <script src="../shared/js/modal.js"></script>
  <script src="../shared/js/jsonUtils.js"></script>
  <script src="./submissions/index.js"></script>
  <script src="./js/instructorApp.js"></script>
</body>
</html>
